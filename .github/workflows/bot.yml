name: Antes do Sino - Bot de Noticias

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      - name: Salvar historico (sent_items.json)
        run: |
          git config --global user.name "antes-do-sino-bot"
          git config --global user.email "bot@antesdosino.local"
          git add sent_items.json docs/index.html portal_history.json
          if ! git diff --staged --quiet; then
            git commit -m "Atualiza historico de noticias e portal"
            git pull origin main --no-rebase -X ours
            git push origin main
          else
            echo "Nenhuma alteracao para salvar."
          fi
